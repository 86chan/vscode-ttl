name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Sync version to tag
        env:
          TAG: ${{ github.ref_name }}
        run: npm version "${TAG#v}" --no-git-tag-version

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Package release VSIX
        env:
          TAG: ${{ github.ref_name }}
        run: npx @vscode/vsce package --no-dependencies --allow-missing-repository --out "ttl-language-${TAG}.vsix"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" "ttl-language-${TAG}.vsix" \
            --title "$TAG" \
            --generate-notes
