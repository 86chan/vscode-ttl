name: Protect yml

on:
  pull_request:
    paths:
      - '**/*.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Block yml changes from non-admins
        env:
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$ACTOR" != "86chan" ]; then
            echo "Error: .yml file changes are restricted to repository admins only."
            exit 1
          fi
