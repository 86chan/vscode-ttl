name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Package debug VSIX
        run: npx @vscode/vsce package --no-dependencies --pre-release --out ttl-language-debug.vsix

      - name: Upload debug VSIX
        uses: actions/upload-artifact@v4
        with:
          name: ttl-language-debug
          path: ttl-language-debug.vsix
          retention-days: 14
